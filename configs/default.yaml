proyecto:
  nombre: "rag-document-intelligence"
  version: "1.0.0"
  corpus: "boe_legal"
  idioma: "es"
  descripcion: "Sistema RAG sobre legislación española del BOE"

ingestion:
  chunk_size: 512
  chunk_overlap: 64
  estrategia_chunking: "recursive"  # opciones: fixed, semantic, recursive
  formatos_soportados:
    - ".pdf"
    - ".txt"
    - ".md"
  min_chunk_length: 50  # descarta chunks demasiado cortos

embeddings:
  modelo: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  dispositivo: "cpu"
  batch_size: 32
  normalizar: true
  dimension: 384

vector_store:
  tipo: "chromadb"              # opciones: chromadb, pinecone
  directorio_persistencia: "./data/chroma_db"
  nombre_coleccion: "boe_legal_docs"
  metrica_distancia: "cosine"
  pinecone:
    index_name: "boe-legal-docs"
    namespace: "default"

retrieval:
  top_k: 5
  hybrid_alpha: 0.7      # 1.0 = solo denso, 0.0 = solo BM25
  reranking_habilitado: true
  modelo_reranker: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  rrf_k: 60              # constante para Reciprocal Rank Fusion

generation:
  modelo: "claude-sonnet-4-6"
  max_tokens: 2048
  temperatura: 0.1
  streaming: true
  mock_mode: false

evaluation:
  dataset_path: "./data/evaluation/eval_dataset.json"
  output_path: "./data/evaluation/results.json"
  use_llm_judge: false   # true = métricas LLM judge estilo RAGAS (requiere API key)
  metricas:
    - fidelidad
    - relevancia_respuesta
    - precision_contexto
    - recall_contexto

api:
  host: "0.0.0.0"
  puerto: 8000
  nivel_log: "info"
  cors_origins:
    - "http://localhost:8501"
    - "http://ui:8501"
    - "http://localhost:3000"

ui:
  api_url: "http://localhost:8000"
  max_historial: 10
  top_k_defecto: 5
  hybrid_alpha_defecto: 0.7

cache:
  redis_url: ""          # vacío = in-memory. Ej: redis://localhost:6379/0
  ttl: 3600
  max_entries: 128
  similarity_threshold: 0.95

agent:
  max_sub_queries: 3
  top_k_per_query: 5
  reranking: true
  alpha: 0.7

boe:
  directorio_raw: "data/raw"
  max_docs_por_dia: 15
  delay_entre_requests: 0.5
  secciones_interes:
    - "1"   # I. Disposiciones generales
    - "2"   # II. Autoridades y personal
    - "3"   # III. Otras disposiciones
